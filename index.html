<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Астро Архив — Астрономический архив Telegram</title>
  <meta name="description" content="Архив публикаций Telegram-канала 'Астро новости' — космос, планеты, туманности, галактики и космонавтика">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔭</text></svg>">
  <link rel="stylesheet" href="css/app.css">
</head>

<body>

  <!-- ═══ Header ═══ -->
  <header class="header">
    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Меню">☰</button>

    <div class="logo">
      <span class="logo-icon">🔭</span>
      <div>
        <div class="logo-text">Астро Архив</div>
        <div class="logo-sub">Telegram Archive</div>
      </div>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="search-input"
             placeholder="Поиск по публикациям..." autocomplete="off">
      <button class="search-clear" id="search-clear" aria-label="Очистить">✕</button>
    </div>

    <div class="nav-tabs">
      <button class="nav-tab active" data-view="grid">
        <span class="nav-tab-icon">▦</span>
        <span>Лента</span>
      </button>
      <button class="nav-tab" data-view="tiktok">
        <span class="nav-tab-icon">▶</span>
        <span>Случайное</span>
      </button>
    </div>

    <div class="post-count">
      📝 <span id="post-count-num">—</span>
    </div>
  </header>

  <!-- ═══ Sidebar (Topics) ═══ -->
  <aside class="sidebar">
    <div class="sidebar-title">Темы</div>
    <button class="sidebar-clear" id="sidebar-clear">✕ Сбросить фильтр</button>
    <div id="topic-list"></div>
  </aside>

  <!-- ═══ Main Content (Grid view) ═══ -->
  <main class="main">
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Загрузка архива...</div>
    </div>
    <div class="posts-grid" id="posts-grid"></div>
  </main>

  <!-- ═══ TikTok Feed Mode ═══ -->
  <div class="tiktok-feed" id="tiktok-feed"></div>

  <div class="tiktok-nav-hint" id="tiktok-nav-hint" style="display:none">
    <button class="tiktok-nav-btn" id="tiktok-up" aria-label="Вверх">↑</button>
    <button class="tiktok-nav-btn" id="tiktok-down" aria-label="Вниз">↓</button>
  </div>

  <div class="tiktok-counter" id="tiktok-counter" style="display:none"></div>

  <!-- ═══ Post Detail Modal ═══ -->
  <div class="post-modal-overlay" id="post-modal">
    <button class="post-modal-close" id="post-modal-close" aria-label="Закрыть">✕</button>
    <div class="post-modal" id="post-modal-content"></div>
  </div>

  <!-- ═══ Lightbox ═══ -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" aria-label="Закрыть">✕</button>
    <button class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="Предыдущее">‹</button>
    <img id="lightbox-img" src="" alt="">
    <button class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="Следующее">›</button>
  </div>

  <script src="js/app.js"></script>

</body>
</html>
